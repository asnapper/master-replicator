name: Helm publish

on:
  push:
    branches: [master]
    tags: ['chart-v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: helm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  lint-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - name: Lint chart
        run: helm lint charts/pipeline-status --strict

      - name: Template chart (default values)
        run: |
          helm template ps charts/pipeline-status \
              --namespace pipeline-status \
              > /tmp/render-default.yaml
          test -s /tmp/render-default.yaml

      - name: Template chart (with stateVolume enabled)
        run: |
          helm template ps charts/pipeline-status \
              --namespace pipeline-status \
              --set stateVolume.enabled=true \
              --set stateVolume.claimName=test-claim \
              > /tmp/render-statevol.yaml
          test -s /tmp/render-statevol.yaml

      - name: Validate rendered manifests (kubeconform)
        run: |
          # Schema-validate without needing a live cluster.
          curl -fsSL https://github.com/yannh/kubeconform/releases/download/v0.6.6/kubeconform-linux-amd64.tar.gz \
              | tar -xz -C /tmp/
          /tmp/kubeconform -strict -summary -kubernetes-version 1.28.0 \
              /tmp/render-default.yaml /tmp/render-statevol.yaml

      - name: Log in to GHCR
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
              --username "${{ github.actor }}" \
              --password-stdin

      - name: Package chart
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          mkdir -p /tmp/chart-pkg
          helm package charts/pipeline-status --destination /tmp/chart-pkg

      - name: Push chart to GHCR (OCI)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          shopt -s nullglob
          for pkg in /tmp/chart-pkg/*.tgz; do
              helm push "$pkg" oci://ghcr.io/asnapper/charts
          done

      - name: Log out of GHCR
        if: ${{ always() && github.event_name != 'pull_request' }}
        run: helm registry logout ghcr.io || true
